<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo ProFinder</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo de ProFinder con ícono de lupa estilizada y tipografía bold</desc>

  <defs>
    <clipPath id="clip-circle">
      <circle cx="200" cy="160" r="72"/>
    </clipPath>
  </defs>

  

  <!-- Ícono: círculo exterior de la lupa -->
  <circle cx="116" cy="148" r="58" fill="none" stroke="#1a56a0" stroke-width="14" style="fill:none;stroke:rgb(26, 86, 160);color:rgb(251, 251, 254);stroke-width:14px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Ícono: relleno interior con líneas de búsqueda -->
  <line x1="88" y1="135" x2="144" y2="135" stroke="#1a56a0" stroke-width="8" stroke-linecap="round" opacity="0.25" style="fill:rgb(0, 0, 0);stroke:rgb(26, 86, 160);color:rgb(251, 251, 254);stroke-width:8px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="88" y1="152" x2="144" y2="152" stroke="#1a56a0" stroke-width="8" stroke-linecap="round" opacity="0.45" style="fill:rgb(0, 0, 0);stroke:rgb(26, 86, 160);color:rgb(251, 251, 254);stroke-width:8px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.45;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="88" y1="169" x2="126" y2="169" stroke="#1a56a0" stroke-width="8" stroke-linecap="round" opacity="0.25" style="fill:rgb(0, 0, 0);stroke:rgb(26, 86, 160);color:rgb(251, 251, 254);stroke-width:8px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Ícono: mango de la lupa -->
  <line x1="160" y1="192" x2="192" y2="224" stroke="#1a56a0" stroke-width="14" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(26, 86, 160);color:rgb(251, 251, 254);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Ícono: punto de acento en mango -->
  <circle cx="192" cy="224" r="7" fill="#2563eb" style="fill:rgb(37, 99, 235);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Texto PRO -->
  <text x="220" y="196" style="fill:rgb(26, 86, 160);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Plus Jakarta Sans&quot;, sans-serif;font-size:68px;font-weight:800;text-anchor:start;dominant-baseline:auto">Pro</text>

  <!-- Texto FINDER -->
  <text x="316" y="196" style="fill:rgb(240, 244, 248);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Plus Jakarta Sans&quot;, sans-serif;font-size:68px;font-weight:800;text-anchor:start;dominant-baseline:auto">Finder</text>

  <!-- Subtítulo -->
  <text x="222" y="222" style="fill:rgb(102, 102, 102);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Plus Jakarta Sans&quot;, sans-serif;font-size:15px;font-weight:500;text-anchor:start;dominant-baseline:auto">TUTORES PAES</text>

  <!-- Línea decorativa bajo subtítulo -->
  <rect x="222" y="232" width="40" height="3" rx="2" fill="#1a56a0" style="fill:rgb(26, 86, 160);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>